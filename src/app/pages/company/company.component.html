<div class="company-page">
  <div class="create-panel">
    <h2>Company Information</h2>

    <form [formGroup]="companyForm" (ngSubmit)="onSave()">
      <div *ngIf="submitError" class="error-text">✗ {{ submitError }}</div>
      <div *ngIf="submitSuccess" class="success-text">✓ {{ submitSuccess }}</div>

      <div class="field">
        <label>Universal Id</label>
        <input type="text" formControlName="uid" readonly />
      </div>

      <div class="field">
        <label>Company Name</label>
        <input type="text" formControlName="companyName" placeholder="Enter company name" />
        <span *ngIf="companyForm.get('companyName')?.invalid && companyForm.get('companyName')?.touched" class="error-text">Company Name is required.</span>
      </div>

      <div class="field">
        <label>Registered Number</label>
        <input type="text" formControlName="registeredNumber" readonly />
      </div>

      <div class="field">
        <label>Country</label>
        <select formControlName="countryId">
          <option value="" disabled>Select country</option>
          <option *ngFor="let c of countries" [value]="c.countryId">{{ c.countryName }}</option>
        </select>
        <span *ngIf="companyForm.get('countryId')?.invalid && companyForm.get('countryId')?.touched" class="error-text">Country is required.</span>
      </div>

      <div class="field">
        <label>Address</label>
        <input type="text" formControlName="address" placeholder="Enter address" />
        <span *ngIf="companyForm.get('address')?.invalid && companyForm.get('address')?.touched" class="error-text">Address is required.</span>
      </div>

      <div class="field">
        <label>Mail</label>
        <input type="email" formControlName="mail" readonly />
      </div>

      <div class="field">
        <label>Employee Size</label>
        <input type="number" formControlName="employeeSize" min="1" placeholder="Enter employee size" />
        <span *ngIf="companyForm.get('employeeSize')?.invalid && companyForm.get('employeeSize')?.touched" class="error-text">Employee Size is required and must be at least 1.</span>
      </div>

      <div class="actions">
        <button type="submit" class="save-btn" [disabled]="isSubmitting">{{ isSubmitting ? 'Updating...' : 'Update' }}</button>
        <button type="button" class="reset-btn" (click)="resetForm()">Reset</button>
        <button type="button" class="reset-btn" (click)="cancelForm()">Back</button>
      </div>
    </form>
  </div>
</div>
