<div class="company-page">
  <div class="create-panel">
    <h2>Company Information</h2>

    <form [formGroup]="companyForm" (ngSubmit)="onSave()">
      <div *ngIf="submitError" class="error-text">✗ {{ submitError }}</div>

      <div class="field">
        <label>Universal Id</label>
        <input type="text" formControlName="uid" placeholder="Universal ID" readonly />
      </div>

      <div class="field">
        <label>Company Name</label>
        <input type="text" formControlName="companyName" placeholder="Enter company name" />
        <span *ngIf="companyForm.get('companyName')?.invalid && companyForm.get('companyName')?.touched" class="error-text">Company Name is required.</span>
      </div>

      <div class="field">
        <label>Registered Number</label>
        <input type="text" formControlName="registeredNumber" placeholder="Registered number" readonly />
      </div>

      <div class="field">
        <label>Address Line 1</label>
        <input type="text" formControlName="addressLine1" placeholder="Enter address line 1" />
        <span *ngIf="companyForm.get('addressLine1')?.invalid && companyForm.get('addressLine1')?.touched" class="error-text">Address Line 1 is required.</span>
      </div>

      <div class="field">
        <label>Address Line 2</label>
        <input type="text" formControlName="addressLine2" placeholder="Enter address line 2" />
      </div>

      <div class="field-row">
        <div class="field">
          <label>Country</label>
          <select formControlName="countryId" title="Select country">
            <option value="" disabled>Select country</option>
            <option *ngFor="let c of countries" [value]="c.countryId">{{ c.countryName }}</option>
          </select>
          <span *ngIf="companyForm.get('countryId')?.invalid && companyForm.get('countryId')?.touched" class="error-text">Country is required.</span>
        </div>

        <div class="field">
          <label>State</label>
          <select formControlName="state" title="Select state" [disabled]="states.length === 0" (change)="onStateSelect($any($event.target).value)">
            <option value="" disabled>Select state</option>
            <option *ngFor="let state of states" [value]="state.stateId">{{ state.stateName }}</option>
          </select>
        </div>

        <div class="field">
          <label>City</label>
          <select formControlName="city" title="Select city" [disabled]="cities.length === 0">
            <option value="" disabled>Select city</option>
            <option *ngFor="let city of cities" [value]="city.cityId">{{ city.cityName }}</option>
          </select>
        </div>

        <div class="field">
          <label>Pincode</label>
          <input type="text" formControlName="pincode" placeholder="Enter pincode" />
          <span *ngIf="companyForm.get('pincode')?.invalid && companyForm.get('pincode')?.touched" class="error-text">Pincode must be numeric.</span>
        </div>
      </div>

      <div class="field">
        <label>Mail</label>
        <input type="email" formControlName="mail" placeholder="Email address" readonly />
      </div>

      <div class="field">
        <label>Employee Size</label>
        <input type="number" formControlName="employeeSize" min="1" placeholder="Enter employee size" />
        <span *ngIf="companyForm.get('employeeSize')?.invalid && companyForm.get('employeeSize')?.touched" class="error-text">Employee Size is required and must be at least 1.</span>
      </div>

      <div class="actions">
        <button type="submit" class="save-btn" [disabled]="isSubmitting">{{ isSubmitting ? 'Updating...' : 'Update' }}</button>
        <button type="button" class="reset-btn" (click)="resetForm()">Reset</button>
        <button type="button" class="reset-btn" (click)="cancelForm()">Back</button>        
        <div *ngIf="submitSuccess" class="success-text">✓ {{ submitSuccess }}</div>
      </div>
    </form>
  </div>
</div>
