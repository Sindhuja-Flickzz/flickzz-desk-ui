<div class="dialog-container">
  <h2 mat-dialog-title>Create New Progress Status</h2>
  
  <mat-dialog-content>
    <form [formGroup]="form">
      <!-- Progress Name -->
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Progress Status Name</mat-label>
        <input matInput formControlName="progressName" placeholder="e.g., Backlog, In Progress, Testing">
        <mat-error *ngIf="form.get('progressName')?.hasError('required')">
          Progress status name is required
        </mat-error>
        <mat-error *ngIf="form.get('progressName')?.hasError('minlength')">
          Progress status name must be at least 3 characters
        </mat-error>
      </mat-form-field>

      <!-- Progress Sequence -->
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Sequence Order</mat-label>
        <input matInput type="number" formControlName="progressSequence" placeholder="1">
        <mat-hint>The order in which this status appears</mat-hint>
        <mat-error *ngIf="form.get('progressSequence')?.hasError('required')">
          Sequence order is required
        </mat-error>
        <mat-error *ngIf="form.get('progressSequence')?.hasError('min')">
          Sequence order must be at least 1
        </mat-error>
      </mat-form-field>

      <!-- Color Selection -->
      <div class="color-section">
        <label class="color-label">Select Color</label>
        <div class="color-options">
          <button *ngFor="let color of colorOptions" 
                  type="button"
                  class="color-button"
                  [style.background-color]="color"
                  [class.selected]="selectedColor === color"
                  (click)="onColorSelected(color)"
                  [title]="getFormattedColorName(color)">
            <mat-icon *ngIf="selectedColor === color">check</mat-icon>
          </button>
        </div>
      </div>

      <!-- Selected Color Preview -->
      <div class="color-preview">
        <span class="preview-label">Preview:</span>
        <div class="preview-box" [style.background-color]="selectedColor"></div>
        <span class="color-code">{{ selectedColor }}</span>
      </div>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" 
            (click)="onSubmit()"
            [disabled]="!form.valid">
      Create Status
    </button>
  </mat-dialog-actions>
</div>
