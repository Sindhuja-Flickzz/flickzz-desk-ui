<div class="container" *ngIf="!commonResponse.attributes.mfaEnabled">
  <h2>Login</h2>
  <form (ngSubmit)="login()">
    <div class="form-group">
      <label for="username">Email</label>
      <input type="text" id="username" name="username" required [(ngModel)]="registerLoginRequest.email">
    </div>
    <!-- <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required [(ngModel)]="registerLoginRequest.password">
    </div> -->
    <div class="form-group password-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          id="password" 
          name="password" 
          required 
          [(ngModel)]="registerLoginRequest.password"
        />
        <span class="toggle-icon" (click)="togglePassword()">
          {{ showPassword ? '🔓' : '🔒' }}
        </span>
      </div>
    </div>

    <button type="submit">Login</button>
    <a routerLink="/register">Register</a>
  </form>
</div>

<div class="container" *ngIf="commonResponse.attributes.mfaEnabled">
  <h2>Two-Factor Authentication</h2>
  <div class="form-group">
    <label for="validationCode">Enter 6 digits Validation Code Generated by the app</label>
    <input
      type="text"
      id="validationCode"
      name="validationCode"
      required
      [(ngModel)]="otpCode"
    >
  </div>
  <button type="button" (click)="verifyCode()"
          [class.button-disabled]="otpCode.length < 6"
  >Verify code</button>
</div>
