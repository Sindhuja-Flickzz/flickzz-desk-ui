<div class="container" *ngIf="isLoginMode">
  <h2>Login</h2>
  <form [formGroup]="loginform" (ngSubmit)="login()">    
    <div *ngIf="submitError" class="error-text">✗ {{ submitError }}</div>
    <div class="form-group">
      <label for="username">Username / Email</label>
      <input type="text" formControlName="username" id="username" name="username" required [(ngModel)]="registerLoginRequest.email">
      <span *ngIf="formError.username" class="error-text">{{ 'username' | fieldLabel }} is required</span>
    </div>
    <div class="form-group password-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          formControlName = "password"
          id="password" 
          name="password" 
          required type="password"
          [(ngModel)]="registerLoginRequest.password"
        />
        <span class="toggle-icon" (click)="togglePassword()">
          <!-- {{ showPassword ? '🔓' : '🔒' }} -->
            <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
        </span>
      </div>
      <span *ngIf="formError.password" class="error-text">{{ 'password' | fieldLabel }} is required</span>
    </div>

    <button type="submit">Login</button>
    Don't have and account?<a routerLink="/register"> Register / Signup</a>
  </form>
</div>

<div class="container" *ngIf="!isLoginMode">
  <h2>Two-Factor Authentication</h2>
  <div *ngIf="submitError" class="error-text">✗ {{ submitError }}</div>
  <div class="qr-code" *ngIf="!commonResponse.attributes.mfaEnabled">
    <img [src]="commonResponse.attributes.secretImageUri" alt="QR Code">
  </div>
  <div class="form-group">
    <label for="validationCode">Enter 6 digits Validation Code Generated by the app</label>
    <input
      type="text"
      id="validationCode"
      name="validationCode"
      required
      [(ngModel)]="otpCode"
      (input)="onOtpInput($event)"
      inputmode="numeric"
      maxlength="6"
      placeholder="000000"
    >
  </div>
  <button type="button" (click)="verifyCode()"
          [disabled]="otpCode.length < 6 || isVerifying"
          [class.button-disabled]="otpCode.length < 6 || isVerifying"
  >{{ isVerifying ? 'Verifying...' : 'Verify code' }}</button>
</div>
