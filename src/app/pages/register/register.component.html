<div class="container" *ngIf="!tfaEnabled">
  <h2>Register</h2>
  <form [formGroup]="registerForm" (ngSubmit)="registerUser()">
    <div *ngIf="submitError" class="error-text">✗ {{ submitError }}</div>
    <div *ngIf="message" class="success-message-panel">
      <div class="success-icon">&#10004;</div>
      <div class="success-message">{{ message }}</div>
    </div>

    <div class="form-group">
      <label for="firstname">First name</label>
      <input id="firstname" type="text" formControlName="firstname">
      <span *ngIf="formError.firstname" class="error-text">{{ formError.firstname }}</span>
    </div>

    <div class="form-group">
      <label for="lastname">Last name</label>
      <input id="lastname" type="text" formControlName="lastname">
      <span *ngIf="formError.lastname" class="error-text">{{ formError.lastname }}</span>
    </div>

    <div class="form-group">
      <label for="email">Username / Email</label>
      <input id="email" type="email" formControlName="email">
      <span *ngIf="formError.email" class="error-text">{{ formError.email }}</span>
    </div>

    <div class="form-group">
      <label for="accessId">Access ID</label>
      <input id="accessId" type="text" formControlName="accessId" maxlength="20">
      <span *ngIf="formError.accessId" class="error-text">{{ formError.accessId }}</span>
    </div>

    <div class="form-group password-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          formControlName="password"
        >
        <span class="toggle-icon" (click)="togglePassword()">
          {{ showPassword ? '🔓' : '🔒' }}
        </span>
      </div>
      <span *ngIf="formError.password" class="error-text">{{ formError.password }}</span>
    </div>

    <button type="submit">Register</button>
    <a routerLink="/login">Login</a>
  </form>
</div>

<div class="container" *ngIf="tfaEnabled">
  <div *ngIf="submitError" class="error-text">✗ {{ submitError }}</div>
  <div *ngIf="message" class="success-message-panel">
    <div class="success-icon">&#10004;</div>
    <div class="success-message">{{ message }}</div>
  </div>

  <h2>Set Up Two-Factor Authentication</h2>
  <div class="qr-code">
    <img [src]="commonResponse.attributes.secretImageUri" alt="QR Code">
  </div>
  <div class="form-group">
    <label for="validationCode">Enter 6 digits Validation Code Generated by the app</label>
    <input
      type="text"
      id="validationCode"
      name="validationCode"
      required
      [(ngModel)]="otpCode"
      (input)="onOtpInput($event)"
      maxlength="6"
      inputmode="numeric"
      placeholder="000000"
    >
  </div>
  <button
    type="button"
    (click)="verifyTfa()"
    [disabled]="otpCode.length < 6"
    [class.button-disabled]="otpCode.length < 6"
  >Verify code</button>
</div>
