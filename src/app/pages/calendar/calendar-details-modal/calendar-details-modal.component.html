<div class="modal-container">
  <h2 mat-dialog-title>{{ title }}</h2>

  <mat-dialog-content>
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <!-- Workday Column -->
        <ng-container matColumnDef="workday" *ngIf="data.listType === 'workdays'">
          <th mat-header-cell *matHeaderCellDef>Day</th>
          <td mat-cell *matCellDef="let workday">{{ workday.workday }}</td>
        </ng-container>

        <!-- Holiday Date Column -->
        <ng-container matColumnDef="holidayDate" *ngIf="data.listType === 'holidays'">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let holiday">{{ formatDate(holiday.holidayDate) }}</td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description" *ngIf="data.listType === 'holidays'">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let holiday">{{ holiday.description }}</td>
        </ng-container>

        <!-- Is Active Column -->
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Active</th>
          <td mat-cell *matCellDef="let item">
            <mat-icon [color]="item.isActive ? 'primary' : 'warn'">
              {{ item.isActive ? 'check_circle' : 'cancel' }}
            </mat-icon>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <!-- Empty State -->
      <div *ngIf="dataSource.length === 0" class="empty-state">
        No {{ data.listType }} found for this calendar.
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-raised-button (click)="onClose()">Close</button>
  </mat-dialog-actions>
</div>
