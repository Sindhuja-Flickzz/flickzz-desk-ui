<div class="app-shell" [class.collapsed]="isSidebarCollapsed" [class.menu-open]="isMobileMenuOpen">
 

  <div class="main">
    <header class="topbar" *ngIf="showSidebar">
      <button class="popup-hamburger" *ngIf="isPopupOpen" (click)="togglePopup()" aria-label="Toggle multi-level menu">
        ⨉
      </button>
      <button class="popup-hamburger" *ngIf="!isPopupOpen" (click)="togglePopup()" aria-label="Toggle multi-level menu">
        ☰
      </button>
      <button class="mobile-hamburger" *ngIf="showSidebar && !isPopupOpen" (click)="toggleMobileMenu()" aria-label="Toggle sidebar navigation">
        ☰
      </button>
      <button class="mobile-hamburger" *ngIf="showSidebar && isPopupOpen" (click)="toggleMobileMenu()" aria-label="Toggle sidebar navigation">
        ☰
      </button>
      <div class="page-title">{{ getActivePageTitle() }}</div>
      <div class="topbar-actions">
        <button class="logout" *ngIf="isLoggedIn()" (click)="logout()">Logout</button>
      </div>
    </header>

    <div class="popup-overlay" *ngIf="isPopupOpen" (click)="closePopup()" (mouseenter)="onPopupAreaHover()">
      <div class="popup-panel" (click)="$event.stopPropagation()" (mouseenter)="onPopupAreaHover()" (mouseleave)="closePopupWithDelay()">
        <div class="popup-row" *ngFor="let row of menuPopupRows; let level = index">
          <div
            class="popup-card"
            *ngFor="let node of row"
            [class.active]="isPopupSelected(node, level)"
            [class.disabled]="!node.isActive"
            (mouseenter)="onPopupItemHover(node, level)"
            (click)="onPopupItemClick(node, level, $event)">
            <span class="popup-card-icon">{{ node.icon || '▣' }}</span>
            <span class="popup-card-label">{{ node.name }}</span>
          </div>
        </div>
      </div>
    </div>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>
