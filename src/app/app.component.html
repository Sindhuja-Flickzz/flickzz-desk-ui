<div class="app-shell" [class.collapsed]="isSidebarCollapsed" [class.menu-open]="isMobileMenuOpen">
  <aside class="sidenav" [style.width.px]="sidebarWidth" [class.collapsed]="isSidebarCollapsed" [class.open]="isMobileMenuOpen" *ngIf="showSidebar"
          (mousedown)="onResizeStart($event)" (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()">
    <nav class="menu sidebar-menu" [class.collapsed]="isSidebarCollapsed" [class.open]="isMobileMenuOpen" [class.settings-only]="settingsOnlyMode">
      <div class="sidenav-header">
      <ng-container *ngIf="settingsOnlyMode; else standardHeader">
        <!-- <button class="back-btn" type="button" (click)="exitSettingsMode()" aria-label="Back to full menu">← Back</button>
        <span class="settings-title">Settings</span> -->
        <div class="brand-container">
          <button class="back-btn" type="button" (click)="exitSettingsMode()" aria-label="Back to full menu">←</button>
          <div class="brand-text" *ngIf="!isSidebarCollapsed">
            <h1 class="brand-name">{{ app_consants.APP_NAME }}</h1>
          </div>
        </div>
      </ng-container>
      <ng-template #standardHeader>
        <div class="brand-container">
          <img class="brand-logo" src="assets/flickzz.png" alt="FlickzzDesk logo" />
          <div class="brand-text" *ngIf="!isSidebarCollapsed">
            <h1 class="brand-name">{{ app_consants.APP_NAME }}</h1>
          </div>
        </div>
      </ng-template>
    </div>
    <div class="menu-scroll">
        <ng-template #recursiveList let-items let-level="level">
          <ul class="menu-list level-{{level}}" (click)="toggleToNormal()">
            <li *ngFor="let node of items" [class.active]="isActive(node) || activeNodeId === node.id" [class.disabled]="!node.isActive">
              <div class="menu-entry" [class.open]="isExpanded(node)" (click)="onNodeClick(node)">
                <span class="menu-icon" *ngIf="node.icon">{{ node.icon }}</span>
                <span class="menu-title">{{ node.name }}</span>
                <span *ngIf="node.children?.length" class="submenu-indicator">{{ isExpanded(node) ? '▾' : '▸' }}</span>
              </div>

              <ng-container *ngIf="node.children?.length && isExpanded(node)"
                            [ngTemplateOutlet]="recursiveList"
                            [ngTemplateOutletContext]="{ $implicit: node.children, level: level + 1 }">
              </ng-container>
            </li>
          </ul>
        </ng-template>

        <ng-container *ngTemplateOutlet="recursiveList; context: { $implicit: menuTree, level: 1 }"></ng-container>
      </div>

      <div class="sidebar-footer">
        <button class="sidebar-collapse" (click)="toggleSidebar()" [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'" [class.collapsed]="isSidebarCollapsed">
          <span class="collapse-icon" *ngIf="!isSidebarCollapsed">&#x276E;&#x276E;<</span>
          <span class="collapse-icon" *ngIf="isSidebarCollapsed">>&#x276F;&#x276F;</span>
        </button>
      </div>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="mobile-hamburger" *ngIf="showSidebar" (click)="toggleMobileMenu()" aria-label="Toggle navigation">
        ☰
      </button>
      <div class="page-title">{{ getActivePageTitle() }}</div>
      <div class="topbar-actions">
        <button class="logout" *ngIf="isLoggedIn()" (click)="logout()">Logout</button>
      </div>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>
